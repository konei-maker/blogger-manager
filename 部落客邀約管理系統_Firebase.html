<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDbo6RVuSlaMBVqh9bw87_TKPKcEdFSz_0",
    authDomain: "fir-eb424.firebaseapp.com",
    projectId: "fir-eb424",
    storageBucket: "fir-eb424.firebasestorage.app",
    messagingSenderId: "767759923244",
    appId: "1:767759923244:web:4ada3950a1972d5f257989"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 共用文件路徑
  const DATA_DOC = doc(db, "campaign", "shared_data");

  window._fbSave = async function(state) {
    try {
      await setDoc(DATA_DOC, { payload: JSON.stringify(state) });
    } catch(e) {
      console.error("Firebase 儲存失敗", e);
    }
  };

  window._fbLoad = async function() {
    try {
      const snap = await getDoc(DATA_DOC);
      if (snap.exists()) {
        return JSON.parse(snap.data().payload);
      }
    } catch(e) {
      console.error("Firebase 讀取失敗", e);
    }
    return null;
  };

  // 通知主程式 Firebase 已就緒
  window._fbReady = true;
  document.dispatchEvent(new Event("fb-ready"));
</script>
<style>

  .no-proj p{font-size:15px;margin-top:1rem}
  .loading{text-align:center;padding:4rem;color:#888;font-size:15px}
</style>

<div class="container">
  <div class="top-bar">

<script>
let state = {projects:[]};
let expandedProjs = {}, showAnalysis = {};
let saveTimer = null;

function setSyncStatus(type, msg) {
  const el = document.getElementById('sync-status');
  el.className = 'sync-status ' + type;
  el.textContent = msg;
}

async function loadState() {
  // 等待 Firebase 就緒
  if (!window._fbReady) {
    await new Promise(resolve => document.addEventListener('fb-ready', resolve, {once:true}));
  }
  const data = await window._fbLoad();
  if (data) {
    state = data;
    if (state.projects.length) expandedProjs[state.projects[0].id] = true;
  }
  setSyncStatus('ok', '☁️ 已同步');
  render();
}

async function saveState() {
  setSyncStatus('saving', '💾 儲存中...');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    await window._fbSave(state);
    setSyncStatus('ok', '☁️ 已同步');
  }, 800);
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function esc(s){ const d=document.createElement('div'); d.appendChild(document.createTextNode(s||'')); return d.innerHTML; }

function exportExcel(projId){
  const p=state.projects.find(x=>x.id===projId); if(!p) return;
  const bs=p.bloggers||[], wb=XLSX.utils.book_new();
  const h1=['邀約平台','部落客名稱','IG 網址','粉絲數','報價費用(NT$)','實際費用(NT$)','聯絡電話','體驗日期','審稿日期','發文日期','發布貼文連結','Reels瀏覽量','按讚數','留言數','分享數','互動率(%)'];
  const r1=bs.map(b=>{ const v=parseFloat(b.views)||0,eng=(parseFloat(b.likes)||0)+(parseFloat(b.comments)||0)+(parseFloat(b.shares)||0); return [b.platform||'',b.name||'',b.ig||'',parseFloat(b.followers)||0,parseFloat(b.quote)||0,parseFloat(b.actual)||0,b.phone||'',b.expDate||'',b.reviewDate||'',b.postDate||'',b.postLink||'',v,parseFloat(b.likes)||0,parseFloat(b.comments)||0,parseFloat(b.shares)||0,v?parseFloat(((eng/v)*100).toFixed(1)):0]; });
  const ws1=XLSX.utils.aoa_to_sheet([h1,...r1]);
  ws1['!cols']=[{wch:14},{wch:16},{wch:30},{wch:10},{wch:14},{wch:14},{wch:14},{wch:12},{wch:12},{wch:12},{wch:32},{wch:12},{wch:10},{wch:10},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb,'部落客明細',ws1);
  const tQ=bs.reduce((s,b)=>s+(parseFloat(b.quote)||0),0),tA=bs.reduce((s,b)=>s+(parseFloat(b.actual)||0),0),tV=bs.reduce((s,b)=>s+(parseFloat(b.views)||0),0),tL=bs.reduce((s,b)=>s+(parseFloat(b.likes)||0),0),tC=bs.reduce((s,b)=>s+(parseFloat(b.comments)||0),0),tS=bs.reduce((s,b)=>s+(parseFloat(b.shares)||0),0);
  const posted=bs.filter(b=>b.postLink).length,tE=tL+tC+tS,er=tV?parseFloat(((tE/tV)*100).toFixed(2)):0,cpv=tV&&tA?parseFloat((tA/tV).toFixed(2)):0,cpc=tC&&tA?Math.round(tA/tC):0;
  const s2=[['專案名稱',p.name],['品牌/客戶',p.brand||'-'],['匯出日期',new Date().toLocaleDateString('zh-TW')],[''],['【邀約概況】',''],['邀約人數',bs.length],['已發文人數',posted],[''],['【費用統計】',''],['總報價金額(NT$)',tQ],['總實際費用(NT$)',tA],['節省金額(NT$)',tQ-tA],[''],['【成效數據】',''],['總瀏覽量',tV],['總按讚數',tL],['總留言數',tC],['總分享數',tS],['總互動數',tE],['整體互動率(%)',er],[''],['【效益分析】',''],['每次瀏覽成本(NT$)',cpv],['每則留言成本(NT$)',cpc],['平均每人費用(NT$)',bs.length?Math.round(tA/bs.length):0],[''],['【各部落客成效排行】',''],['名稱','瀏覽量','按讚','留言','分享','互動率(%)','實際費用(NT$)'],...[...bs].sort((a,b)=>(parseFloat(b.views)||0)-(parseFloat(a.views)||0)).map(b=>{ const v=parseFloat(b.views)||0,eng=(parseFloat(b.likes)||0)+(parseFloat(b.comments)||0)+(parseFloat(b.shares)||0); return [b.name,v,parseFloat(b.likes)||0,parseFloat(b.comments)||0,parseFloat(b.shares)||0,v?parseFloat(((eng/v)*100).toFixed(1)):0,parseFloat(b.actual)||0]; })];
  const ws2=XLSX.utils.aoa_to_sheet(s2); ws2['!cols']=[{wch:24},{wch:18},{wch:12},{wch:10},{wch:10},{wch:12},{wch:16}];
  XLSX.utils.book_append_sheet(wb,'成效分析',ws2);
  XLSX.writeFile(wb,`${p.name}_部落客成效報告_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.xlsx`);
}

function render(){
  const c=document.getElementById('proj-container');
  if(!state.projects.length){ c.innerHTML='<div class="no-proj"><p style="font-size:40px">📋</p><p>尚無專案，點擊右上角「新增專案」開始</p></div>'; return; }
  c.innerHTML=state.projects.map(p=>renderProject(p)).join('');
}

function renderProject(p){
  const bs=p.bloggers||[],expanded=!!expandedProjs[p.id],showA=!!showAnalysis[p.id];
  const tA=bs.reduce((s,b)=>s+(parseFloat(b.actual)||0),0),tV=bs.reduce((s,b)=>s+(parseFloat(b.views)||0),0),tL=bs.reduce((s,b)=>s+(parseFloat(b.likes)||0),0),tC=bs.reduce((s,b)=>s+(parseFloat(b.comments)||0),0),tS=bs.reduce((s,b)=>s+(parseFloat(b.shares)||0),0),tQ=bs.reduce((s,b)=>s+(parseFloat(b.quote)||0),0);
  const posted=bs.filter(b=>b.postLink).length,tE=tL+tC+tS,erOverall=tV?((tE/tV)*100).toFixed(2):0,cpv=tV&&tA?(tA/tV).toFixed(2):0;
  const rows=bs.length?bs.map(b=>{ const eng=(parseFloat(b.likes)||0)+(parseFloat(b.comments)||0)+(parseFloat(b.shares)||0),v=parseFloat(b.views)||0,er=v?((eng/v)*100).toFixed(1):null; return `<tr><td>${b.platform?`<span class="badge gray">${esc(b.platform)}</span>`:'-'}</td><td style="font-weight:600">${esc(b.name)}</td><td>${b.ig?`<a class="link-a" href="${esc(b.ig)}" target="_blank">🔗 IG</a>`:'-'}</td><td>${b.followers?Number(b.followers).toLocaleString():'-'}</td><td>${b.quote?'NT$'+Number(b.quote).toLocaleString():'-'}</td><td>${b.actual?'<span class="badge green">NT$'+Number(b.actual).toLocaleString()+'</span>':'-'}</td><td style="white-space:nowrap">${b.phone||'-'}</td><td>${b.expDate||'-'}</td><td>${b.reviewDate||'-'}</td><td>${b.postDate||'-'}</td><td>${b.postLink?`<a class="link-a" href="${esc(b.postLink)}" target="_blank">🔗 查看</a>`:'-'}</td><td>${v?v.toLocaleString():'-'}</td><td>${b.likes?Number(b.likes).toLocaleString():'-'}</td><td>${b.comments?Number(b.comments).toLocaleString():'-'}</td><td>${b.shares?Number(b.shares).toLocaleString():'-'}</td><td>${er?`<span class="badge ${parseFloat(er)>=3?'teal':'amber'}">${er}%</span>`:'-'}</td><td style="white-space:nowrap"><button class="icon-btn" onclick="editBlogger('${p.id}','${b.id}')">✏️</button><button class="icon-btn del" onclick="deleteBlogger('${p.id}','${b.id}')">🗑️</button></td></tr>`; }).join(''):`<tr class="empty-row"><td colspan="17">尚無部落客，點擊「新增部落客」開始</td></tr>`;
  const top=[...bs].filter(b=>b.views).sort((a,b)=>(parseFloat(b.views)||0)-(parseFloat(a.views)||0)).slice(0,3);
  const analysisHtml=showA?`<div class="analysis-panel"><div class="stats-grid"><div class="stat-card"><div class="stat-label">邀約人數</div><div class="stat-val">${bs.length}</div><div class="stat-sub">已發文 ${posted} 人</div></div><div class="stat-card"><div class="stat-label">總報價</div><div class="stat-val" style="font-size:16px">NT$${Math.round(tQ).toLocaleString()}</div></div><div class="stat-card"><div class="stat-label">總實際費用</div><div class="stat-val" style="font-size:16px">NT$${Math.round(tA).toLocaleString()}</div>${tQ>tA?`<div class="stat-sub">節省 NT$${Math.round(tQ-tA).toLocaleString()}</div>`:''}</div><div class="stat-card"><div class="stat-label">總瀏覽量</div><div class="stat-val">${tV.toLocaleString()}</div></div><div class="stat-card"><div class="stat-label">總按讚</div><div class="stat-val">${tL.toLocaleString()}</div></div><div class="stat-card"><div class="stat-label">總留言</div><div class="stat-val">${tC.toLocaleString()}</div></div><div class="stat-card"><div class="stat-label">總分享</div><div class="stat-val">${tS.toLocaleString()}</div></div><div class="stat-card"><div class="stat-label">整體互動率</div><div class="stat-val">${erOverall}%</div></div>${cpv?`<div class="stat-card"><div class="stat-label">每次瀏覽成本</div><div class="stat-val" style="font-size:16px">NT$${cpv}</div></div>`:''}</div>${top.length?`<div class="top-rank-title">🏆 瀏覽量排行</div>${top.map((b,i)=>{const pct=tV?Math.round((parseFloat(b.views)||0)/tV*100):0;return`<div class="progress-row"><span style="min-width:20px;color:#aaa">#${i+1}</span><span style="min-width:110px;font-weight:600">${esc(b.name)}</span><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div><span style="min-width:75px;text-align:right;font-size:12px">${(parseFloat(b.views)||0).toLocaleString()}</span><span class="badge blue">${pct}%</span></div>`;}).join('')}`:''}</div>`:'';
  return `<div class="proj-block${expanded?' expanded':''}" id="proj-${p.id}"><div class="proj-header-row" onclick="toggleExpand('${p.id}')"><span class="chevron">▶</span><div class="proj-title-area"><div class="proj-name-row"><span class="proj-main-name">${esc(p.name)}</span>${p.brand?`<span class="proj-brand">· ${esc(p.brand)}</span>`:''}</div><div class="proj-chips"><span class="badge blue">${bs.length} 位部落客</span>${tA?`<span class="badge green">NT$${Math.round(tA).toLocaleString()}</span>`:''}${tV?`<span class="badge teal">${tV.toLocaleString()} 次瀏覽</span>`:''}</div></div><div class="proj-actions-row" onclick="event.stopPropagation()"><button class="btn${showA?' primary':''}" onclick="toggleAnalysis('${p.id}')">📊 成效</button><button class="btn excel" onclick="exportExcel('${p.id}')">📥 匯出 Excel</button><button class="icon-btn" onclick="editProject('${p.id}')">✏️</button><button class="icon-btn del" onclick="deleteProject('${p.id}')">🗑️</button></div></div><div class="proj-body"><div class="proj-body-toolbar"><span>${bs.length} 位部落客</span><button class="btn primary" onclick="openAddBlogger('${p.id}')">＋ 新增部落客</button></div><div class="table-wrap"><table><thead><tr><th>邀約平台</th><th>名稱</th><th>IG</th><th>粉絲數</th><th>報價</th><th>實際費用</th><th>聯絡電話</th><th>體驗日</th><th>審稿日</th><th>發文日</th><th>貼文</th><th>瀏覽量</th><th>按讚</th><th>留言</th><th>分享</th><th>互動率</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div>${analysisHtml}</div></div>`;
}

function toggleExpand(id){expandedProjs[id]=!expandedProjs[id];render();}
function toggleAnalysis(id){showAnalysis[id]=!showAnalysis[id];if(!expandedProjs[id])expandedProjs[id]=true;render();}
function openNewProject(){ state.editingProjectId=null; ['proj-name-input','proj-brand-input','proj-note-input'].forEach(id=>document.getElementById(id).value=''); document.getElementById('proj-modal-title').textContent='新增專案'; document.getElementById('modal-project').style.display='flex'; }
function editProject(id){ const p=state.projects.find(x=>x.id===id);if(!p)return; state.editingProjectId=id; document.getElementById('proj-modal-title').textContent='編輯專案'; document.getElementById('proj-name-input').value=p.name||''; document.getElementById('proj-brand-input').value=p.brand||''; document.getElementById('proj-note-input').value=p.note||''; document.getElementById('modal-project').style.display='flex'; }
function saveProject(){ const name=document.getElementById('proj-name-input').value.trim(); if(!name){alert('請輸入專案名稱');return;} if(state.editingProjectId){ const p=state.projects.find(x=>x.id===state.editingProjectId); if(p){p.name=name;p.brand=document.getElementById('proj-brand-input').value.trim();p.note=document.getElementById('proj-note-input').value.trim();} }else{ const id=uid(); state.projects.push({id,name,brand:document.getElementById('proj-brand-input').value.trim(),note:document.getElementById('proj-note-input').value.trim(),bloggers:[],createdAt:Date.now()}); expandedProjs[id]=true; } saveState();render();closeModal('modal-project'); }
function deleteProject(id){ if(!confirm('確定要刪除此專案？所有部落客資料將一併刪除。'))return; state.projects=state.projects.filter(x=>x.id!==id); delete expandedProjs[id];delete showAnalysis[id]; saveState();render(); }
function openAddBlogger(projId){ state.editingBloggerId=null;state.editingBloggerProjId=projId; document.getElementById('blogger-modal-title').textContent='新增部落客'; ['b-platform','b-name','b-ig','b-followers','b-phone','b-quote','b-actual','b-exp-date','b-review-date','b-post-date','b-post-link','b-views','b-likes','b-comments','b-shares'].forEach(id=>document.getElementById(id).value=''); document.getElementById('modal-blogger').style.display='flex'; }
function editBlogger(projId,blogId){ const p=state.projects.find(x=>x.id===projId);if(!p)return; const b=p.bloggers.find(x=>x.id===blogId);if(!b)return; state.editingBloggerId=blogId;state.editingBloggerProjId=projId; document.getElementById('blogger-modal-title').textContent='編輯部落客'; document.getElementById('b-platform').value=b.platform||''; document.getElementById('b-name').value=b.name||''; document.getElementById('b-ig').value=b.ig||''; document.getElementById('b-followers').value=b.followers||''; document.getElementById('b-phone').value=b.phone||''; document.getElementById('b-quote').value=b.quote||''; document.getElementById('b-actual').value=b.actual||''; document.getElementById('b-exp-date').value=b.expDate||''; document.getElementById('b-review-date').value=b.reviewDate||''; document.getElementById('b-post-date').value=b.postDate||''; document.getElementById('b-post-link').value=b.postLink||''; document.getElementById('b-views').value=b.views||''; document.getElementById('b-likes').value=b.likes||''; document.getElementById('b-comments').value=b.comments||''; document.getElementById('b-shares').value=b.shares||''; document.getElementById('modal-blogger').style.display='flex'; }
function saveBlogger(){ const name=document.getElementById('b-name').value.trim(); if(!name){alert('請輸入部落客名稱');return;} const p=state.projects.find(x=>x.id===state.editingBloggerProjId);if(!p)return; const data={name,platform:document.getElementById('b-platform').value.trim(),ig:document.getElementById('b-ig').value.trim(),followers:document.getElementById('b-followers').value,phone:document.getElementById('b-phone').value.trim(),quote:document.getElementById('b-quote').value,actual:document.getElementById('b-actual').value,expDate:document.getElementById('b-exp-date').value,reviewDate:document.getElementById('b-review-date').value,postDate:document.getElementById('b-post-date').value,postLink:document.getElementById('b-post-link').value.trim(),views:document.getElementById('b-views').value,likes:document.getElementById('b-likes').value,comments:document.getElementById('b-comments').value,shares:document.getElementById('b-shares').value}; if(state.editingBloggerId){ const idx=p.bloggers.findIndex(x=>x.id===state.editingBloggerId); if(idx>-1)p.bloggers[idx]={...p.bloggers[idx],...data}; }else{ p.bloggers.push({id:uid(),...data}); } saveState();render();closeModal('modal-blogger'); }
function deleteBlogger(projId,blogId){ if(!confirm('確定要刪除此部落客？'))return; const p=state.projects.find(x=>x.id===projId);if(!p)return; p.bloggers=p.bloggers.filter(x=>x.id!==blogId); saveState();render(); }
function closeModal(id){document.getElementById(id).style.display='none';}

loadState();
</script>
</body>
</html>
